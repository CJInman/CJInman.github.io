<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Christopher Inman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1c1f2b;
      --text:      #e2e4ec;
      --text-mid:  #9da3b4;
      --text-faint:#5a6178;
      --accent:    #6a9fd8;
      --accent-hi: #88b8f0;
      --rule:      #252836;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px; padding: 0 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(19,22,31,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule);
    }
    .nav-name {
      font-size: 0.95rem; font-weight: 600;
      color: var(--text); text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem; font-weight: 300;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-mid); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent-hi); }

    .page {
      max-width: 820px; margin: 0 auto;
      padding: 120px 2rem 100px;
    }

    .page-header {
      margin-bottom: 3rem; padding-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
    }
    .page-title {
      font-size: 2rem; font-weight: 600;
      color: var(--text); letter-spacing: -0.02em;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .contact-card {
      display: flex; flex-direction: column;
      gap: 0.3rem;
      padding: 1.2rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .contact-card:hover {
      border-color: var(--accent);
      background: rgba(106,159,216,0.06);
    }

    .contact-icon {
      display: flex; align-items: center;
      color: var(--text-mid);
      margin-bottom: 0.5rem;
      transition: color 0.2s;
    }
    .contact-card:hover .contact-icon { color: var(--accent-hi); }

    .contact-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.67rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-faint);
    }
    .contact-value {
      font-size: 0.93rem; font-weight: 500;
      color: var(--accent-hi);
      word-break: break-all;
    }
    .contact-card:hover .contact-value { color: var(--text); }

    footer {
      margin-top: 5rem; padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .footer-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.67rem; color: var(--text-faint); letter-spacing: 0.05em;
    }

    @media (max-width: 600px) {
      nav { padding: 0 1.2rem; }
      .nav-links { gap: 1.4rem; }
      .page { padding: 100px 1.2rem 60px; }
    }
  </style>
</head>
